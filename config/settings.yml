# Central config for non-secret runtime constants.
# Available NewsData categories:
# - politics
# - business
# - technology
# - health
# Temporary lightweight mode: only one category enabled first.
newsdata:
  base_url: https://newsdata.io/api/1
  country: id
  language: id,en
  page_size: 10
  categories:
    - politics

gemini:
  model: gemini-2.5-flash

output:
  csv: data/news.csv
