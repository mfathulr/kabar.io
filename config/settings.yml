# Central config for non-secret runtime constants.
# Available NewsData categories:
# - business
# - crime
# - domestic
# - education
# - entertainment
# - environment
# - food
# - health
# - lifestyle
# - politics
# - science
# - sports
# - technology
# - top
# - tourism
# - world
# - other
# - top
# Catatan: `breaking` bukan category filter di config ini; kalau perlu, pakai sebagai label konten,
# bukan sebagai nilai `newsdata.categories`.
# Use `newsdata.active_category_set` for the default mix.
# Use `NEWSDATA_CATEGORIES` or `NEWSDATA_ACTIVE_CATEGORY_SET` to override per run when scheduling rotations.
# Audience target is Indonesia-only, so `language` is pinned to `id`.
# `page_size` should stay at or below 10 for the free tier.
newsdata:
  base_url: https://newsdata.io/api/1
  country: id
  language: id
  page_size: 10
  active_category_set: core_daily
  category_sets:
    core_daily:
      - politics
      - business
      - technology
      - health
      - world
    tail_a:
      - entertainment
      - sports
      - domestic
      - education
    tail_b:
      - crime
      - environment
      - food
      - lifestyle
    tail_c:
      - science
      - tourism
      - top
      - other
    core_daily_plus_tail_a:
      - politics
      - business
      - technology
      - health
      - world
      - entertainment
      - sports
      - domestic
      - education
    core_daily_plus_tail_b:
      - politics
      - business
      - technology
      - health
      - world
      - crime
      - environment
      - food
      - lifestyle
    core_daily_plus_tail_c:
      - politics
      - business
      - technology
      - health
      - world
      - science
      - tourism
      - top
      - other
    balanced:
      - politics
      - business
      - technology
      - health
      - world
    broader:
      - politics
      - business
      - technology
      - health
      - world
      - entertainment
      - sports
    local:
      - domestic
      - politics
      - education
      - crime
      - health
    economy:
      - business
      - technology
      - domestic
      - world
      - politics
  categories:
    - business
    - crime
    - domestic
    - education
    - entertainment
    - environment
    - food
    - health
    - lifestyle
    - politics
    - science
    - sports
    - technology
    - top
    - tourism
    - world
    - other
  credit_budget_per_day: 200
  credit_buffer: 30
  max_pages_per_category: 2

gemini:
  model: gemini-2.5-flash
  # Free-tier fallback order for sentiment analysis.
  # Primary model stays on Gemini 2.5 Flash; fallback uses Flash Lite preview
  # if the primary model is rate-limited or unavailable.
  models:
    - gemini-2.5-flash
    - gemini-2.5-flash-lite-preview-09-2025

output:
  csv: data/news.csv
